name: Test and package VSIX

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:vsix
      - uses: actions/upload-artifact@v4
        with:
          name: axon-wrangler-vsix
          path: dist/*.vsix
